<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- FONDO DE CONTRASTE: Ámbar/Naranja Atardecer -->
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="body_shine" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Fondo redondeado estilo App Icon -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg_grad)"/>

  <!-- PERSONAJE KOLO (Centrado y Maximizado) -->
  <g transform="translate(102, 102) scale(8.2)">
    <!-- Cuerpo de Gota -->
    <path d="M50,14 C22,14 8,42 8,68 C8,88 28,98 50,98 C72,98 92,88 92,68 C92,42 78,14 50,14 Z"
          fill="url(#body_shine)" filter="drop-shadow(0 4px 4px rgba(0,0,0,0.1))" />

    <!-- Pelo Doble -->
    <path d="M42,16 C38,-2 32,5 34,16 C36,18 40,18 42,16 Z" fill="#38bdf8" />
    <path d="M58,16 C62,-2 68,5 66,16 C64,18 60,18 58,16 Z" fill="#38bdf8" />

    <!-- Cejas -->
    <path d="M28,48 Q33,43 38,48" fill="none" stroke="#075985" stroke-width="1.8" stroke-linecap="round" />
    <path d="M62,48 Q67,43 72,48" fill="none" stroke="#075985" stroke-width="1.8" stroke-linecap="round" />

    <!-- Ojos Brillantes -->
    <g>
      <circle cx="34" cy="62" r="14" fill="white" />
      <circle cx="34" cy="62" r="11" fill="#0c4a6e" />
      <circle cx="31" cy="58" r="3.5" fill="white" />
      <circle cx="38" cy="66" r="1.5" fill="white" opacity="0.8" />

      <circle cx="66" cy="62" r="14" fill="white" />
      <circle cx="66" cy="62" r="11" fill="#0c4a6e" />
      <circle cx="63" cy="58" r="3.5" fill="white" />
      <circle cx="70" cy="66" r="1.5" fill="white" opacity="0.8" />
    </g>

    <!-- Mejillas -->
    <circle cx="16" cy="78" r="6" fill="#fbbf24" />
    <circle cx="84" cy="78" r="6" fill="#fbbf24" />

    <!-- Boca Frijolito -->
    <path d="M43,80 Q50,88 57,80 Q57,86 50,86 Q43,86 43,80 Z" fill="#0f172a" />
  </g>
</svg>